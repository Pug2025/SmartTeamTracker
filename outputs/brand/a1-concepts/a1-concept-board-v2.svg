    <rect class="card" width="700" height="610" rx="22"/><path d="M22 .5H678" stroke="rgba(255,255,255,.36)"/>
    <use href="#blade-s" x="54" y="88" width="260" height="260" color="#17B6C8"/>
    <text x="360" y="92" class="display eyebrow">04 · BLADE S</text>
    <text x="360" y="142" class="display name">Athletic S + skate edge</text>
    <text x="360" y="179" class="ui desc">A hard-drawn S carries a teal blade</text>
    <text x="360" y="207" class="ui desc">edge and a single puck/data point.</text>
    <text x="360" y="270" class="ui label">SMALL-SIZE TEST</text>
    <rect x="360" y="293" width="70" height="70" rx="15" fill="#141C26"/><use href="#blade-s" x="379" y="312" width="32" height="32" color="#17B6C8"/>
    <rect x="444" y="293" width="70" height="70" rx="15" fill="#141C26"/><use href="#blade-s" x="471" y="320" width="16" height="16" color="#17B6C8"/>
