  <rect width="1600" height="1600" fill="#05070C"/>
  <text x="80" y="82" class="display" fill="#EEF4FA" font-size="52" font-weight="900" letter-spacing="-1">SMART TEAM TRACKER — A1 MARK DIRECTIONS</text>
  <text x="82" y="126" class="ui" fill="#C2CEDD" font-size="21" font-weight="600">Ice system · teal is the only brand color · every mark tested on #0C1219</text>

  <!-- card 1 -->
  <g transform="translate(80 180)">
    <rect class="card" width="700" height="610" rx="22"/><path d="M22 .5H678" stroke="rgba(255,255,255,.36)"/>
    <use href="#cut-crest" x="54" y="88" width="260" height="260" color="#17B6C8"/>
    <text x="360" y="92" class="display eyebrow">01 · CUT CREST</text>
    <text x="360" y="142" class="display name">Shield + negative-space S</text>
    <text x="360" y="179" class="ui desc">The product crest becomes the brand.</text>
    <text x="360" y="207" class="ui desc">A skate-cut S and puck live inside.</text>
    <text x="360" y="270" class="ui label">SMALL-SIZE TEST</text>
    <rect x="360" y="293" width="70" height="70" rx="15" fill="#141C26"/><use href="#cut-crest" x="379" y="312" width="32" height="32" color="#17B6C8"/>
    <rect x="444" y="293" width="70" height="70" rx="15" fill="#141C26"/><use href="#cut-crest" x="471" y="320" width="16" height="16" color="#17B6C8"/>
    <text x="360" y="388" class="ui small">32 px</text><text x="444" y="388" class="ui small">16 px</text>
    <text x="360" y="444" class="ui label">MONO</text><use href="#cut-crest" x="360" y="466" width="86" height="86" color="#FFFFFF"/>
    <text x="54" y="563" class="ui small">Most ownable · strongest tie to the existing crest component</text>
  </g>

  <!-- card 2 -->
  <g transform="translate(820 180)">
    <rect class="card" width="700" height="610" rx="22"/><path d="M22 .5H678" stroke="rgba(255,255,255,.36)"/>
    <use href="#puck-index" x="54" y="88" width="260" height="260" color="#17B6C8"/>
    <text x="360" y="92" class="display eyebrow">02 · PUCK INDEX</text>
    <text x="360" y="142" class="display name">Rink corners + rising datum</text>
    <text x="360" y="179" class="ui desc">Two opposing rink corners frame</text>
    <text x="360" y="207" class="ui desc">a tracked puck on an insight line.</text>
    <text x="360" y="270" class="ui label">SMALL-SIZE TEST</text>
    <rect x="360" y="293" width="70" height="70" rx="15" fill="#141C26"/><use href="#puck-index" x="379" y="312" width="32" height="32" color="#17B6C8"/>
    <rect x="444" y="293" width="70" height="70" rx="15" fill="#141C26"/><use href="#puck-index" x="471" y="320" width="16" height="16" color="#17B6C8"/>
    <text x="360" y="388" class="ui small">32 px</text><text x="444" y="388" class="ui small">16 px</text>
    <text x="360" y="444" class="ui label">MONO</text>
    <g transform="translate(360 466) scale(.672)"><path d="M21 96V56c0-21 14-34 35-34h26M107 32V72c0 21-14 34-35 34H46" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round"/><path d="M43 84 64 63 85 42" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round"/><circle cx="64" cy="63" r="9" fill="#fff"/><circle cx="64" cy="63" r="3.5" fill="#0C1219"/></g>
    <text x="54" y="563" class="ui small">Most analytical · clearest hockey/insight intersection</text>
  </g>

  <!-- card 3 -->
  <g transform="translate(80 830)">
    <rect class="card" width="700" height="610" rx="22"/><path d="M22 .5H678" stroke="rgba(255,255,255,.36)"/>
    <use href="#ice-aperture" x="54" y="88" width="260" height="260" color="#17B6C8"/>
