<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <symbol id="cut-crest" viewBox="0 0 128 128">
      <defs><mask id="board-cut"><rect width="128" height="128" fill="#000"/><path d="M31 17C43 11 52 9 64 9s21 2 33 8c5 2 8 7 8 12v41c0 23-15 38-41 50C38 108 23 93 23 70V29c0-5 3-10 8-12Z" fill="#fff"/><path d="M83 34H55c-12 0-18 6-18 14s6 13 18 13h18c12 0 18 6 18 15s-7 16-20 16H43" fill="none" stroke="#000" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/><circle cx="84" cy="34" r="7" fill="#000"/></mask></defs>
      <rect width="128" height="128" fill="currentColor" mask="url(#board-cut)"/>
    </symbol>
    <symbol id="puck-index" viewBox="0 0 128 128">
      <path d="M21 96V56c0-21 14-34 35-34h26M107 32V72c0 21-14 34-35 34H46" fill="none" stroke="#EEF4FA" stroke-width="14" stroke-linecap="round"/>
      <path d="M43 84 64 63 85 42" fill="none" stroke="currentColor" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/><circle cx="64" cy="63" r="9" fill="currentColor"/><circle cx="64" cy="63" r="3.5" fill="#0C1219"/>
    </symbol>
    <symbol id="ice-aperture" viewBox="0 0 128 128">
      <path d="M53 19H37c-10 0-18 8-18 18v16M75 19h16c10 0 18 8 18 18v16M109 75v16c0 10-8 18-18 18H75M53 109H37c-10 0-18-8-18-18V75" fill="none" stroke="#EEF4FA" stroke-width="14" stroke-linecap="round"/><circle cx="64" cy="64" r="19" fill="none" stroke="currentColor" stroke-width="10"/><circle cx="64" cy="64" r="7" fill="currentColor"/>
    </symbol>
    <symbol id="blade-s" viewBox="0 0 128 128">
      <path d="M100 25H52c-15 0-24 8-24 19 0 12 9 19 24 19h24c15 0 24 8 24 20 0 13-10 21-26 21H27" fill="none" stroke="#EEF4FA" stroke-width="17" stroke-linecap="square" stroke-linejoin="round"/><path d="M27 104h47c16 0 26-8 26-21" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="square"/><circle cx="28" cy="44" r="6" fill="currentColor"/>
    </symbol>
    <style>
      .display{font-family:'Saira Semi Condensed','Arial Narrow',Arial,sans-serif}.ui{font-family:'Hanken Grotesk',Arial,sans-serif}.card{fill:#0C1219;stroke:rgba(255,255,255,.16);stroke-width:1}.eyebrow{fill:#17B6C8;font-size:20px;font-weight:800;letter-spacing:3px}.name{fill:#EEF4FA;font-size:32px;font-weight:800;letter-spacing:.2px}.desc{fill:#C2CEDD;font-size:18px;font-weight:600}.label{fill:#9DAABE;font-size:15px;font-weight:700;letter-spacing:1.8px}.small{fill:#C2CEDD;font-size:14px;font-weight:600}
    </style>
