    <text x="360" y="142" class="display name">Tracking frame + centre puck</text>
    <text x="360" y="179" class="ui desc">Four rink corners become a live</text>
    <text x="360" y="207" class="ui desc">tracking aperture around one event.</text>
    <text x="360" y="270" class="ui label">SMALL-SIZE TEST</text>
    <rect x="360" y="293" width="70" height="70" rx="15" fill="#141C26"/><use href="#ice-aperture" x="379" y="312" width="32" height="32" color="#17B6C8"/>
    <rect x="444" y="293" width="70" height="70" rx="15" fill="#141C26"/><use href="#ice-aperture" x="471" y="320" width="16" height="16" color="#17B6C8"/>
    <text x="360" y="388" class="ui small">32 px</text><text x="444" y="388" class="ui small">16 px</text>
    <text x="360" y="444" class="ui label">MONO</text>
    <g transform="translate(360 466) scale(.672)"><path d="M53 19H37c-10 0-18 8-18 18v16M75 19h16c10 0 18 8 18 18v16M109 75v16c0 10-8 18-18 18H75M53 109H37c-10 0-18-8-18-18V75" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round"/><circle cx="64" cy="64" r="19" fill="none" stroke="#fff" stroke-width="10"/><circle cx="64" cy="64" r="7" fill="#fff"/></g>
    <text x="54" y="563" class="ui small">Best favicon · most immediate live-tracking signal</text>
  </g>

