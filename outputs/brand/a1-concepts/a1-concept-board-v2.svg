    <g transform="translate(360 466) scale(.672)"><path d="M100 25H52c-15 0-24 8-24 19 0 12 9 19 24 19h24c15 0 24 8 24 20 0 13-10 21-26 21H27" fill="none" stroke="#fff" stroke-width="17" stroke-linecap="square" stroke-linejoin="round"/><path d="M27 104h47c16 0 26-8 26-21" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="square"/><circle cx="28" cy="44" r="6" fill="#fff"/></g>
    <text x="54" y="563" class="ui small">Most athletic · strongest standalone letter recognition</text>
