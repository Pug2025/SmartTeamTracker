<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <rect width="1600" height="1600" fill="#000000"/>
  <g transform="translate(92 86)">
    <text x="0" y="0" fill="#888888" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="3">DIRECTION 01</text>
    <text x="0" y="55" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800">Center-Ice Signal</text>
    <text x="0" y="94" fill="#888888" font-family="Arial, Helvetica, sans-serif" font-size="23">Rink geometry + a live tracked event</text>
  </g>

  <!-- large icon -->
  <g transform="translate(150 240)">
    <rect x="0" y="0" width="390" height="390" rx="88" fill="#111111"/>
    <rect x="86" y="44" width="218" height="302" rx="104" fill="none" stroke="#FFFFFF" stroke-width="26"/>
    <path d="M195 58V154 M195 236V332" stroke="#4DA3FF" stroke-width="24" stroke-linecap="round"/>
    <circle cx="195" cy="195" r="35" fill="#4DA3FF"/>
    <circle cx="195" cy="195" r="15" fill="#000000"/>
  </g>

  <!-- horizontal lockup -->
  <g transform="translate(650 292)">
    <g transform="scale(.5)">
      <rect x="86" y="44" width="218" height="302" rx="104" fill="none" stroke="#FFFFFF" stroke-width="26"/>
      <path d="M195 58V154 M195 236V332" stroke="#4DA3FF" stroke-width="24" stroke-linecap="round"/>
      <circle cx="195" cy="195" r="35" fill="#4DA3FF"/>
      <circle cx="195" cy="195" r="15" fill="#000000"/>
    </g>
    <text x="226" y="64" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700" letter-spacing="-2">Smart Team</text>
    <text x="226" y="130" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800" letter-spacing="-2">Tracker</text>
    <rect x="228" y="152" width="84" height="8" rx="4" fill="#4DA3FF"/>
  </g>

  <!-- small size test -->
  <g transform="translate(682 1030)">
    <text x="0" y="0" fill="#888888" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" letter-spacing="2">ACTUAL-SIZE TEST</text>
    <rect x="0" y="32" width="112" height="112" rx="25" fill="#111111"/>
    <g transform="translate(40 72) scale(.08205)">
      <rect x="86" y="44" width="218" height="302" rx="104" fill="none" stroke="#FFFFFF" stroke-width="34"/>
      <path d="M195 58V150 M195 240V332" stroke="#4DA3FF" stroke-width="32" stroke-linecap="round"/>
      <circle cx="195" cy="195" r="40" fill="#4DA3FF"/>
      <circle cx="195" cy="195" r="17" fill="#000000"/>
    </g>
    <text x="129" y="92" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">32 px</text>
    <text x="129" y="123" fill="#888888" font-family="Arial, Helvetica, sans-serif" font-size="18">capsule · line · puck</text>
  </g>

  <text x="92" y="1510" fill="#666666" font-family="Arial, Helvetica, sans-serif" font-size="18">Concept sketch — geometry and proportions subject to refinement in Phase 2</text>
</svg>
