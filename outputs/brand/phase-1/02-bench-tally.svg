<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <rect width="1600" height="1600" fill="#000000"/>
  <g transform="translate(92 86)">
    <text x="0" y="0" fill="#888888" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="3">DIRECTION 02</text>
    <text x="0" y="55" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800">Bench Tally</text>
    <text x="0" y="94" fill="#888888" font-family="Arial, Helvetica, sans-serif" font-size="23">Counting marks become sticks and a rising stat</text>
  </g>

  <!-- large icon -->
  <g transform="translate(150 240)">
    <rect width="390" height="390" rx="88" fill="#111111"/>
    <path d="M103 88V258 Q103 282 127 282H153" fill="none" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M178 68V238 Q178 262 202 262H228" fill="none" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M253 46V214 Q253 238 277 238H303" fill="none" stroke="#4DA3FF" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M79 318L315 78" stroke="#4DA3FF" stroke-width="17" stroke-linecap="round" opacity=".9"/>
  </g>

  <!-- lockup -->
  <g transform="translate(650 302)">
    <g transform="scale(.48)">
      <path d="M103 88V258 Q103 282 127 282H153" fill="none" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M178 68V238 Q178 262 202 262H228" fill="none" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M253 46V214 Q253 238 277 238H303" fill="none" stroke="#4DA3FF" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M79 318L315 78" stroke="#4DA3FF" stroke-width="17" stroke-linecap="round" opacity=".9"/>
    </g>
    <text x="220" y="100" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800" letter-spacing="-2">Smart Team Tracker</text>
    <text x="223" y="142" fill="#888888" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" letter-spacing="4">LIVE HOCKEY. COUNTED.</text>
  </g>

  <!-- small size test -->
  <g transform="translate(682 1030)">
    <text x="0" y="0" fill="#888888" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" letter-spacing="2">ACTUAL-SIZE TEST</text>
    <rect x="0" y="32" width="112" height="112" rx="25" fill="#111111"/>
    <g transform="translate(40 72) scale(.08205)">
      <path d="M103 88V258 Q103 282 127 282H153" fill="none" stroke="#FFFFFF" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M178 68V238 Q178 262 202 262H228" fill="none" stroke="#FFFFFF" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M253 46V214 Q253 238 277 238H303" fill="none" stroke="#4DA3FF" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M79 318L315 78" stroke="#4DA3FF" stroke-width="25" stroke-linecap="round"/>
    </g>
    <text x="129" y="92" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">32 px</text>
    <text x="129" y="123" fill="#888888" font-family="Arial, Helvetica, sans-serif" font-size="18">three sticks · live-event slash</text>
  </g>

  <text x="92" y="1510" fill="#666666" font-family="Arial, Helvetica, sans-serif" font-size="18">Concept sketch — geometry and proportions subject to refinement in Phase 2</text>
