<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Live Spectator View | SmartTeamTracker</title>
<meta name="theme-color" content="#07111b" />
<meta name="description" content="Open the SmartTeamTracker live spectator view with score, momentum, chance quality, and the live game feed." />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="SmartTeamTracker" />
<meta property="og:title" content="Live Spectator View | SmartTeamTracker" />
<meta property="og:description" content="Follow the game live with score, momentum, chance quality, and a live game feed." />
<meta property="og:image" content="/spectator-preview.svg" />
<meta property="og:image:type" content="image/svg+xml" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="SmartTeamTracker live spectator preview card" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Live Spectator View | SmartTeamTracker" />
<meta name="twitter:description" content="Follow the game live with score, momentum, chance quality, and a live game feed." />
<meta name="twitter:image" content="/spectator-preview.svg" />
<style>
  :root{
    color-scheme:dark;
    --bg:#07111b;
    --panel:#0e1826;
    --line:#27415d;
    --text:#f4f6fb;
    --muted:#aab8cc;
    --accent:#8fe3ad;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    background:
      radial-gradient(circle at 50% -10%, rgba(145,188,236,0.18), transparent 28%),
      linear-gradient(180deg, #08111b 0%, #04090f 100%);
    color:var(--text);
    font-family:"Avenir Next","SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  .share-card{
    width:min(100%, 520px);
    background:rgba(12, 19, 30, 0.96);
    border:1px solid var(--line);
    border-radius:24px;
    padding:28px 24px 24px;
    box-shadow:0 24px 60px rgba(0,0,0,0.36), inset 0 1px 0 rgba(255,255,255,0.03);
    text-align:center;
  }
  .eyebrow{
    color:var(--accent);
    font-size:12px;
    font-weight:800;
    letter-spacing:3px;
    text-transform:uppercase;
  }
  h1{
    margin:14px 0 10px;
    font-size:32px;
    line-height:1.08;
    letter-spacing:-0.7px;
  }
  p{
    margin:0;
    color:var(--muted);
    font-size:15px;
    line-height:1.5;
  }
  .preview{
    margin:22px auto 0;
    width:100%;
    border-radius:18px;
    border:1px solid rgba(135, 155, 187, 0.16);
    overflow:hidden;
    background:#0a121d;
  }
  .preview img{
    display:block;
    width:100%;
    height:auto;
  }
  .fallback{
    margin-top:18px;
    font-size:14px;
  }
  .fallback a{
    color:#d8e6f6;
  }
</style>
</head>
<body>
  <main class="share-card">
    <div class="eyebrow">Live Spectator View</div>
    <h1>Opening the Game</h1>
    <p>Loading the live spectator screen with score, momentum, chance quality, and the live game feed.</p>
    <div class="preview">
      <img src="/spectator-preview.svg" alt="SmartTeamTracker spectator preview" />
    </div>
    <div class="fallback">
      <a id="openLink" href="/">Open spectator view</a>
    </div>
  </main>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('live') || params.get('code') || '';
      const target = code ? '/?live=' + encodeURIComponent(code) : '/';
      const link = document.getElementById('openLink');
      if (link) link.href = target;
      window.location.replace(target);
    })();
  </script>
</body>
</html>
